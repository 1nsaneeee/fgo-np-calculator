<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FGO Damage Calculator // 宝具伤害计算器</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #fff;
      --border: #d9dde3;
      --border-light: #e8ebf0;
      --text: #1a1d23;
      --text-secondary: #4a5568;
      --text-muted: #6b7280;
      --accent: #3b6ef0;
      --accent-light: #e8effe;
      --accent-hover: #2958d4;
      --red: #dc3545;
      --red-bg: #fde8ea;
      --green: #1a8a4a;
      --green-bg: #e6f4ec;
      --blue: #2563eb;
      --blue-bg: #e8effe;
      --gold: #b8860b;
      --gold-bg: #fef3cd;
      --buster: #d63031;
      --arts: #0984e3;
      --quick: #00b894;
      --shadow-sm: none;
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 6px;
      --radius-sm: 4px;
      /* Typography Scale */
      --font-xs: 11px;
      --font-sm: 13px;
      --font-base: 15px;
      --font-md: 18px;
      --font-lg: 22px;
      --font-xl: 28px;
      --font-hero: 36px;
      /* Spacing Scale */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-section: 40px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);color:var(--text);
      font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      min-height:100vh;
      font-size:var(--font-base);
    }
    #root{position:relative;}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#c4c9d2;border-radius:3px}

    /* ── Layout ── */
    .app{max-width:1600px;margin:0 auto;padding:20px 20px 60px}
    .app-title{
      font-size:26px;font-weight:700;color:var(--text);
      text-align:center;margin-bottom:20px;padding-bottom:14px;
      border-bottom:1px solid var(--border-light);
    }

    .layout-2col{display:grid;grid-template-columns:1fr 400px;gap:var(--space-lg);align-items:start}
    .left-col{min-width:0;display:flex;flex-direction:column;gap:var(--space-sm)}
    .right-col{position:sticky;top:16px;display:flex;flex-direction:column;gap:var(--space-md);max-height:calc(100vh - 32px);overflow-y:auto}

    /* ── Accessibility ── */
    *:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
    }

    @media(max-width:1200px){
      .layout-2col{grid-template-columns:1fr}
      .right-col{position:static}
    }
    @media(max-width:800px){
      .grid2{grid-template-columns:1fr}
      .grid3{grid-template-columns:1fr 1fr}
      .servant-card{flex-direction:column;text-align:center}
    }

    /* ── Section Layout (replaces card-based .panel) ── */
    .panel{
      background:transparent;border:none;
      border-radius:0;padding:0;margin-bottom:0;
      box-shadow:none;
    }
    .section{
      background:transparent;border:none;
      border-bottom:1px solid var(--border-light);
      padding:0 0 var(--space-md) 0;margin-bottom:0;
      box-shadow:none;border-radius:0;
    }
    .section-card{
      background:#fafbfc;border:1px solid var(--border-light);
      border-radius:var(--radius);padding:var(--space-md);
      box-shadow:none;
    }
    .section-prominent{
      background:linear-gradient(135deg,#f0f4ff 0%,#e8effe 100%);
      border:1px solid #c8d6f0;
      border-radius:var(--radius);padding:var(--space-lg);
      box-shadow:var(--shadow-md);
    }
    .panel-title{
      font-size:var(--font-sm);font-weight:700;color:var(--text-secondary);
      margin-bottom:12px;padding-left:0;
      border-left:none;border-bottom:none;
      text-transform:uppercase;letter-spacing:0.04em;line-height:1.3;
    }

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

    /* ── Form Elements ── */
    label{display:block;font-size:var(--font-sm);color:var(--text-secondary);margin-bottom:3px;font-weight:600}
    input[type=number],select{
      width:100%;padding:8px 12px;background:var(--surface);
      border:1px solid var(--border);border-radius:var(--radius-sm);
      color:var(--text);font-size:var(--font-base);font-family:inherit;
      transition:border-color 0.15s;
    }
    input[type=number]:focus,select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(59,110,240,0.1)}
    input[type=range]{width:100%;accent-color:var(--accent)}
    button{
      padding:7px 14px;background:var(--surface);color:var(--text-secondary);
      border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--font-sm);
      cursor:pointer;font-family:inherit;transition:all 0.15s;font-weight:600;
    }
    button:hover{background:#f5f6f8;border-color:#c4c9d2}
    button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    button.active:hover{background:var(--accent-hover)}
    button.reset{background:var(--surface);color:var(--red);border-color:#e0c0c4}
    button.reset:hover{background:var(--red-bg)}

    /* ── Search ── */
    .search-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
    .search-row input{flex:1}
    .search-dropdown{
      position:absolute;top:100%;left:0;right:0;max-height:280px;overflow-y:auto;
      background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);
      z-index:100;box-shadow:var(--shadow-md);
    }
    .search-item{
      padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border-light);
      display:flex;justify-content:space-between;align-items:center;font-size:var(--font-base);
      transition:background 0.1s;
    }
    .search-item:hover,.search-item.focused{background:var(--accent-light)}
    .search-item.selected{background:#dce6fc}

    /* ── Class Filter Chips ── */
    .class-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
    .class-chip{
      padding:3px 10px;border-radius:14px;font-size:var(--font-xs);font-weight:600;
      cursor:pointer;border:1px solid var(--border);transition:all 0.15s;
      background:var(--surface);color:var(--text-secondary);
      font-family:inherit;line-height:1.4;
    }
    .class-chip:hover{background:var(--accent-light);border-color:var(--accent)}
    .class-chip.chip-active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* ── Buff Table ── */
    .buff-table{width:100%;border-collapse:collapse;font-size:var(--font-sm)}
    .buff-table th{
      padding:7px 4px;text-align:center;font-weight:600;color:var(--text-muted);
      font-size:var(--font-xs);border-bottom:2px solid var(--border);
      background:#fafbfc;
    }
    .buff-table td{padding:4px 4px;border-bottom:1px solid var(--border-light);text-align:center}
    .buff-table tbody tr:nth-child(even){background:#f7f8fa}
    .buff-table tbody tr:hover{background:#eef1f6}
    .buff-table tr.group-end td{border-bottom:2px solid var(--border)}
    .buff-table .buff-label{
      text-align:right;font-size:var(--font-sm);color:var(--text-secondary);font-weight:600;
      padding-right:10px;white-space:nowrap;min-width:95px;
    }
    .buff-table input[type=number]{
      width:64px;padding:4px 2px;font-size:var(--font-sm);text-align:center;
      -moz-appearance:textfield;background:#fafbfc;
    }
    .buff-table input[type=number]::-webkit-outer-spin-button,
    .buff-table input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .buff-table input[type=number]:focus{background:var(--surface)}
    .buff-table .total-cell{font-weight:700;font-size:var(--font-base);min-width:80px}
    .buff-table .total-cell.capped{color:var(--red)}

    /* ── Servant Card ── */
    .servant-card{
      display:flex;gap:16px;align-items:center;padding:14px;
      background:transparent;border-radius:0;border:none;
    }
    .servant-class{display:inline-block;padding:3px 10px;border-radius:3px;font-size:var(--font-xs);font-weight:700;letter-spacing:1px}
    .servant-name{font-size:var(--font-lg);font-weight:700}
    .servant-stat{font-size:var(--font-base);color:var(--text-secondary)}
    .servant-stat span{color:var(--accent);font-weight:600}

    /* ── NP Damage Result ── */
    .result-row{display:flex;gap:10px;flex-wrap:wrap}
    .result-card{
      flex:1;min-width:0;padding:12px 10px;background:#fafbfc;
      border-radius:var(--radius-sm);border:1px solid var(--border-light);text-align:center;
    }
    .result-label{font-size:var(--font-xs);color:var(--text-muted);font-weight:600}
    .result-value{font-size:var(--font-lg);font-weight:800;margin-top:2px}
    .result-value.min{color:var(--blue)}
    .result-value.avg{color:var(--green)}
    .result-value.max{color:var(--red)}

    /* ── Card Chain Slots ── */
    .card-slots{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .card-slot{
      width:64px;height:64px;border-radius:var(--radius-sm);display:flex;
      align-items:center;justify-content:center;
      font-size:28px;font-weight:800;cursor:pointer;
      border:2px solid var(--border);transition:all 0.15s;
      user-select:none;position:relative;background:var(--surface);
      font-family:inherit;padding:0;
    }
    .card-slot.Buster{border-color:#e8b4b4;color:var(--buster);background:#fff5f5}
    .card-slot.Arts{border-color:#b8d4f0;color:var(--arts);background:#f4f8ff}
    .card-slot.Quick{border-color:#a0e0cc;color:var(--quick);background:#f4fdf9}
    .card-slot:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
    .card-slot:active{transform:translateY(0)}
    .card-slot .slot-pos{position:absolute;top:3px;left:7px;font-size:var(--font-xs);opacity:0.5;font-weight:600}
    .card-slots .extra-toggle{
      display:flex;align-items:center;justify-content:center;
      width:46px;height:46px;border-radius:var(--radius-sm);cursor:pointer;font-size:18px;
      font-weight:800;transition:all 0.15s;font-family:inherit;padding:0;
      border:2px dashed var(--border);color:var(--text-muted);background:var(--surface);
    }
    .card-slots .extra-toggle.on{
      border-color:var(--gold);color:var(--gold);background:var(--gold-bg);border-style:solid;
    }
    .card-slots .plus-sep{font-size:16px;color:var(--text-muted);margin:0 2px;font-weight:300}

    /* ── Chain Result Table ── */
    .chain-result{display:grid;grid-template-columns:75px 85px 85px 75px;gap:6px;font-size:var(--font-base);padding:6px}
    .chain-header{color:var(--text-muted);font-weight:600;font-size:var(--font-sm);padding-bottom:3px;border-bottom:1px solid var(--border-light)}
    .chain-total{font-weight:700;color:var(--accent);border-top:2px solid var(--border);padding-top:4px;font-size:var(--font-md)}

    /* ── 3T Loop ── */
    .loop-row{display:flex;gap:8px}
    .loop-card{
      flex:1;padding:12px 8px;background:linear-gradient(135deg,#f5f8ff 0%,#eef3ff 100%);
      border-radius:var(--radius-sm);border:1px solid #dce4f5;text-align:center
    }
    .loop-card .loop-turn{font-size:var(--font-xs);color:var(--text-muted);font-weight:600}
    .loop-card .loop-dmg{font-size:var(--font-lg);font-weight:800;color:var(--green);margin:4px 0}
    .loop-card .loop-np{font-size:var(--font-sm);color:var(--text-secondary)}
    .loop-card .loop-ok{font-size:var(--font-xs);margin-top:2px;color:var(--green);font-weight:600}
    .loop-card .loop-fail{font-size:var(--font-xs);margin-top:2px;color:var(--red);font-weight:600}

    /* ── Tooltip ── */
    .tooltip{position:relative;cursor:help;border-bottom:1px dotted var(--text-muted)}
    .tooltip::after{
      content:attr(aria-label);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);
      padding:4px 8px;background:var(--text);border:1px solid var(--text);
      border-radius:4px;font-size:var(--font-xs);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;
      color:#fff;
    }
    .tooltip:hover::after{opacity:1}

    /* ── Presets ── */
    .preset-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .preset-row span.preset-label{font-size:var(--font-sm);color:var(--text-secondary);font-weight:700;line-height:30px;margin-right:4px}
    .preset-row button{font-size:var(--font-sm);padding:5px 12px;font-weight:600;border-radius:var(--radius-sm)}
    .preset-row button.preset-arts{border-color:#b8d4f0;color:var(--arts)}
    .preset-row button.preset-arts:hover{background:#f4f8ff;border-color:var(--arts)}
    .preset-row button.preset-buster{border-color:#e8b4b4;color:var(--buster)}
    .preset-row button.preset-buster:hover{background:#fff5f5;border-color:var(--buster)}
    .preset-row button.preset-quick{border-color:#a0e0cc;color:var(--quick)}
    .preset-row button.preset-quick:hover{background:#f4fdf9;border-color:var(--quick)}
    .preset-row button.preset-general{border-color:var(--border);color:var(--text-secondary)}
    .preset-row button.preset-general:hover{background:#f5f6f8;border-color:var(--accent)}

    /* ── Options ── */
    .options-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .options-row button{font-size:var(--font-sm);padding:5px 10px}
    .options-row select{width:auto;padding:5px 8px;font-size:var(--font-sm)}

    /* ── NP Damage Sticky Card ── */
    .np-sticky-card{
      text-align:center;padding:28px 16px;
      background:linear-gradient(135deg,#e8f0ff 0%,#dce8ff 100%);
      border:1px solid #b8cdf0;border-left:4px solid var(--accent);
      border-radius:var(--radius);box-shadow:0 4px 16px rgba(59,110,240,0.1);
    }
    .np-sticky-card .np-sticky-title{font-size:var(--font-xs);color:var(--text-secondary);font-weight:700;letter-spacing:0.06em;margin-bottom:12px;text-transform:uppercase}
    .np-sticky-card .np-sticky-values{display:flex;gap:10px;justify-content:center}
    .np-sticky-card .np-sticky-val{flex:1;text-align:center}
    .np-sticky-card .np-sticky-val .vlabel{font-size:var(--font-xs);color:var(--text-muted);font-weight:700;letter-spacing:0.05em}
    .np-sticky-card .np-sticky-val .vnum{font-size:var(--font-xl);font-weight:800;line-height:1.1}
    .np-sticky-card .vnum.min{color:var(--blue)}
    .np-sticky-card .vnum.avg{font-size:var(--font-hero);color:var(--green)}
    .np-sticky-card .vnum.max{color:var(--red)}

    /* ── Interaction Feedback ── */
    @keyframes valuePop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
    .np-sticky-card .vnum{transition:color 0.3s}
    .np-sticky-card{transition:box-shadow 0.3s,border-color 0.3s}
    .np-sticky-card:hover{box-shadow:0 6px 24px rgba(59,110,240,0.18)}

    .card-slot:active{transform:scale(0.93)!important}
    .card-slot{transition:transform 0.12s,box-shadow 0.15s,border-color 0.15s,background 0.15s}

    input[type=number]{transition:border-color 0.2s,box-shadow 0.2s,background 0.15s}
    input[type=number]:focus{transform:translateY(-1px)}

    button{transition:transform 0.12s,background 0.15s,border-color 0.15s,box-shadow 0.15s}
    button:active:not(.card-slot):not(.extra-toggle){transform:scale(0.97)}

    .result-card{transition:transform 0.2s,box-shadow 0.2s}
    .result-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}

    .loop-card{transition:transform 0.2s,box-shadow 0.2s}
    .loop-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}

    .search-item{transition:background 0.1s,transform 0.1s}
    .search-item:active{transform:scale(0.98)}
  </style>
</head>
<body>
<div id="root"></div>

const CLASS_CORRECTION = {Saber:1,Archer:0.95,Lancer:1.05,Rider:1,Caster:0.9,Assassin:0.9,Berserker:1.1,Ruler:1.1,Avenger:1.1,Alterego:1,MoonCancer:1,Foreigner:1,Pretender:1,Shielder:1,Beast:1};

const ATTRIBUTE_LIST = ['Human','Sky','Earth','Star','Beast'];

function getAttributeAdvantage(attacker, defender) {
  const matrix = {
    Human:{Human:1,Sky:1,Earth:0.9,Star:1,Beast:1},
    Sky:{Human:1,Sky:1,Earth:1.1,Star:0.9,Beast:1},
    Earth:{Human:1.1,Sky:0.9,Earth:1,Star:1,Beast:1},
    Star:{Human:1,Sky:1.1,Earth:1,Star:1,Beast:1.1},
    Beast:{Human:1,Sky:1,Earth:1,Star:1.1,Beast:1}
  };
  const v = matrix[attacker] && matrix[attacker][defender];
  return v || 1;
}

const NP_COLOR_CARD_MULT = {Buster:1.5, Arts:1.0, Quick:0.8};

const ENEMY_NP_MOD = {
  Saber:1, Archer:0.95, Lancer:1, Rider:1.1, Caster:1.2,
  Assassin:0.9, Berserker:0.8, Ruler:1, Avenger:1, Alterego:1,
  MoonCancer:1, Foreigner:1, Pretender:1, Shielder:1, Beast:1
};

const BUFF_CAPS = {
  atkUp:400, defDown:100, colorMod:400, critDmg:500,
  starGen:300, npStrength:500, npRate:1000, powerMod:400,
  flatDmg:100000
};

const CARD_COMBOS = ['BBB','BBA','BBQ','BAB','BAA','BAQ','BQB','BQA','BQQ','ABB','ABA','ABQ','AAB','AAA','AAQ','AQB','AQA','AQQ','QBB','QBA','QBQ','QAB','QAA','QAQ','QQB','QQA','QQQ'];

// CALCULATION FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function clamp(v, cap) { return Math.max(0, Math.min(v, cap)); }

function aggregateBuffs(buffs, servant, options) {
  // Combine CE + Self + Support + Enemy + Debuff
  const keys = ['atkUp','defDown','busterUp','artsUp','quickUp','critDmg','starGen','npStrength','npRate','powerMod','flatDmg'];
  const raw = {};
  const sources = ['ce','self','support','enemy','debuff'];

  for (const k of keys) {
    let val = 0;
    for (const src of sources) {
      val += (buffs[src] && buffs[src][k] !== undefined) ? (buffs[src][k] || 0) : 0;
    }
    // Add servant passives if enabled
    const sv = servant;
    if (options && options.enablePassives && sv) {
      if (k === 'busterUp') val += getSv(sv, 'passiveBuster');
      if (k === 'artsUp') val += getSv(sv, 'passiveArts');
      if (k === 'quickUp') val += getSv(sv, 'passiveQuick');
      if (k === 'critDmg') val += getSv(sv, 'passiveCrit');
      if (k === 'flatDmg') val += getSv(sv, 'passiveFlat');
      if (k === 'npRate') val += getSv(sv, 'passiveNpGen');
      if (k === 'npStrength') val += getSv(sv, 'passiveNpStrength');
    }
    raw[k] = val;
  }

  // Apply caps
  const agg = {};
  agg.atkUp = clamp(raw.atkUp, 400);
  agg.defDown = clamp(raw.defDown, 100);
  agg.busterUp = clamp(raw.busterUp, 400);
  agg.artsUp = clamp(raw.artsUp, 400);
  agg.quickUp = clamp(raw.quickUp, 400);
  agg.critDmg = clamp(raw.critDmg, 500);
  agg.starGen = clamp(raw.starGen, 300);
  agg.npStrength = clamp(raw.npStrength, 500);
  agg.npRate = clamp(raw.npRate, 1000);
  agg.powerMod = clamp(raw.powerMod, 400);
  agg.flatDmg = clamp(raw.flatDmg, 100000);

  return agg;
}

function calcNPDamage(servant, config, buffs, enemy, options) {
  if (!servant) return {min:0, avg:0, max:0};

  const sv = servant;
  const agg = aggregateBuffs(buffs, sv, options);

  // ATK calculation
  const atkLv = config.level >= 120 ? getSv(sv, 'atk120')
    : config.level >= 100 ? getSv(sv, 'atk100')
    : getSv(sv, 'atk90');
  const totalAtk = atkLv + (config.fou || 0) + (config.ceAtk || 0) + (config.extraAtk || 0);

  // NP multiplier for current NP level
  const npLev = config.npLevel || 1;
  const npKeys = ['np1','np2','np3','np4','np5'];
  const npMult = getSv(sv, npKeys[npLev-1]) || 0;
  const npColor = getSv(sv, 'npColor');

  // Class advantage
  const svClass = getSv(sv, 'class');
  const enClass = enemy.class || 'Saber';
  const classAdv = (CLASS_ADVANTAGE[svClass] && CLASS_ADVANTAGE[svClass][enClass]) || 1;

  // Attribute advantage
  const svAttr = getSv(sv, 'attr') || 'Human';
  const enAttr = enemy.attr || 'Human';
  const attrAdv = getAttributeAdvantage(svAttr, enAttr);

  // Class correction
  const classCorr = CLASS_CORRECTION[svClass] || 1;

  // NP card multiplier
  const npCardMult = NP_COLOR_CARD_MULT[npColor] || 1;

  // Color buff
  let colorBuff = 0;
  if (npColor === 'Buster') colorBuff = agg.busterUp;
  else if (npColor === 'Arts') colorBuff = agg.artsUp;
  else if (npColor === 'Quick') colorBuff = agg.quickUp;

  // Enemy defense (defDown reduces enemy def, not add to atkUp)
  const netEnemyDef = clamp((enemy.def || 0) - agg.defDown, 0, 100);
  const defMultiplier = 1 - netEnemyDef / 100;

  // ATK multiplier (defDown NOT included here)
  const atkUp = agg.atkUp / 100;

  // NP strength and power mod
  const npStrength = agg.npStrength / 100;
  const powerMod = agg.powerMod / 100;

  // Base damage formula: 0.23 * ATK * NP_mult/100 * cardMult * colorBuff * atkBuff * classAdv * attrAdv * classCorr * defMultiplier * npStrengthPower * random
  const baseDmg = 0.23 * totalAtk * (npMult / 100) * npCardMult
    * (1 + colorBuff / 100)
    * (1 + atkUp)
    * classAdv * attrAdv * classCorr
    * defMultiplier
    * (1 + npStrength + powerMod);

  const minDmg = Math.floor(baseDmg * 0.9 + agg.flatDmg);
  const avgDmg = Math.floor(baseDmg * 1.0 + agg.flatDmg);
  const maxDmg = Math.floor(baseDmg * 1.099 + agg.flatDmg);

  return {
    min: minDmg,
    avg: avgDmg,
    max: maxDmg,
    totalAtk,
    details: {
      svClass, enClass, classAdv, attrAdv, classCorr,
      npMult, npCardMult, colorBuff, atkUp, netEnemyDef,
      npStrength, powerMod, enemyDef: enemy.def, baseDmg,
      agg
    }
  };
}

function calcNPGainPerHit(servant, buffs, enemy, options, isNP, cardType, position) {
  if (!servant) return 0;
  const sv = servant;
  const agg = aggregateBuffs(buffs, sv, options);

  const npColor = getSv(sv, 'npColor');
  const npRate = getSv(sv, 'npRate');

  // Card type for NP gain coefficient
  const effectiveType = isNP ? npColor : (cardType || 'Arts');
  const cardCoef = {Arts:3, Quick:1, Buster:0, Extra:1};
  const baseCardValue = isNP ? (cardCoef[npColor] || 0) : (cardCoef[effectiveType] || 0);

  // Position multiplier: 1st=1.0, 2nd=1.5, 3rd=2.0, Extra=1.0
  const posMult = position === 'first' ? 1.0 : position === 'second' ? 1.5 : position === 'third' ? 2.0 : 1.0;

  // First card Arts bonus: +1.0 cardValue for non-NP, non-first cards
  let firstCardArtsBonus = 0;
  if (!isNP && position !== 'first' && options && options.firstCard === 'Arts') {
    firstCardArtsBonus = 1;
  }

  const cardValue = baseCardValue * posMult + firstCardArtsBonus;

  // Color buff
  let colorBuff = 0;
  if (effectiveType === 'Buster') colorBuff = agg.busterUp;
  else if (effectiveType === 'Arts') colorBuff = agg.artsUp;
  else if (effectiveType === 'Quick') colorBuff = agg.quickUp;

  // Enemy NP modifier
  const enClass = enemy.class || 'Saber';
  const enemyMod = ENEMY_NP_MOD[enClass] || 1;

  // Overkill
  const overkillMult = (options && options.overkill) ? 1.5 : 1;

  // Critical hits generate 2x NP
  const critMult = (options && options.isCrit) ? 2 : 1;

  // Per-hit NP: NP_rate * cardNpValue * (1+colorBuff) * enemyMod * (1+npRateBuff) * overkill * crit
  const perHit = npRate * cardValue
    * (1 + colorBuff / 100)
    * enemyMod
    * (1 + agg.npRate / 100)
    * overkillMult
    * critMult;

  return Math.max(0, perHit);
}

function calcNPGainForCard(servant, buffs, enemy, options, cardType, position) {
  if (!servant) return 0;
  const sv = servant;
  const hits = cardType === 'Buster' ? getSv(sv, 'bHits')
    : cardType === 'Arts' ? getSv(sv, 'aHits')
    : cardType === 'Quick' ? getSv(sv, 'qHits')
    : cardType === 'Extra' ? getSv(sv, 'eHits') : 0;

  if (hits === 0) return 0;

  const isNP = (cardType === getSv(sv, 'npColor'));
  const perHit = calcNPGainPerHit(servant, buffs, enemy, options, isNP, cardType, position);

  return Math.floor(perHit * hits * 100) / 100;
}

function calcCardDamage(servant, config, buffs, enemy, options, cardType, position, firstCardType) {
  if (!servant || cardType === 'NP') return 0;
  const sv = servant;
  const agg = aggregateBuffs(buffs, sv, options);

  const totalAtk = getSv(sv, 'atk90') + (config.fou || 0) + (config.ceAtk || 0) + (config.extraAtk || 0);

  const cardDmgCoef = {Arts:1, Quick:0.8, Buster:1.5, Extra:1};
  const dmgCoef = cardDmgCoef[cardType] || 1;

  // Position bonus: 1st=1, 2nd=1.2, 3rd=1.4
  const posBonus = position === 'first' ? 1 : position === 'second' ? 1.2 : 1.4;

  // First card Buster bonus
  const firstCardBusterBonus = (firstCardType === 'Buster') ? 0.5 : 0;

  let colorBuff = 0;
  if (cardType === 'Buster') colorBuff = agg.busterUp;
  else if (cardType === 'Arts') colorBuff = agg.artsUp;
  else if (cardType === 'Quick') colorBuff = agg.quickUp;

  const svClass = getSv(sv, 'class');
  const classAdv = (CLASS_ADVANTAGE[svClass] && CLASS_ADVANTAGE[svClass][enemy.class]) || 1;
  const classCorr = CLASS_CORRECTION[svClass] || 1;
  const attrAdv = getAttributeAdvantage(getSv(sv, 'attr') || 'Human', enemy.attr || 'Human');
  const defMultiplier = 1 - clamp((enemy.def || 0) - agg.defDown, 0, 100) / 100;

  const critMult = (options && options.isCrit) ? 2 : 1;
  let critBuff = 0;
  if (options && options.isCrit) {
    critBuff = agg.critDmg;
    if (cardType === 'Buster') critBuff += getSv(sv, 'passiveBusterCrit');
    if (cardType === 'Arts') critBuff += getSv(sv, 'passiveArtsCrit');
    if (cardType === 'Quick') critBuff += getSv(sv, 'passiveQuickCrit');
    critBuff = clamp(critBuff, 500);
  }

  const dmg = 0.23 * totalAtk * dmgCoef * (1 + posBonus)
    * (1 + firstCardBusterBonus)
    * (1 + colorBuff / 100)
    * (1 + agg.atkUp / 100)
    * (1 + agg.powerMod / 100)
    * (critMult + critBuff / 100)
    * classAdv * attrAdv * classCorr
    * defMultiplier;

  return Math.floor(dmg);
}

function calcStarPerHit(servant, buffs, enemy, options, cardType, position) {
  if (!servant) return 0;
  const sv = servant;
  const agg = aggregateBuffs(buffs, sv, options);

  const baseStarRate = getSv(sv, 'starRate');

  // Position-based star value
  const firstPos = position === 'first' ? 0 : (position === 'second' ? 1 : 2);
  const starValues = {
    Quick: 80 + 50 * firstPos,
    Buster: 10 + 5 * firstPos,
    Arts: 0,
    Extra: 100
  };
  const cardStarValue = starValues[cardType] || 0;

  let colorBuff = 0;
  if (cardType === 'Buster') colorBuff = agg.busterUp;
  else if (cardType === 'Arts') colorBuff = agg.artsUp;
  else if (cardType === 'Quick') colorBuff = agg.quickUp;

  const overkillBonus = (options && options.overkill) ? 30 : 0;

  const starRate = baseStarRate * 100
    + cardStarValue * (1 + colorBuff / 100)
    + agg.starGen
    + overkillBonus;

  return clamp(starRate, 0, 300) / 100;
}

function calcStars(servant, buffs, enemy, options, cardType, position) {
  if (!servant) return {floor:0, expected:0, ceil:0};
  const sv = servant;
  const hits = cardType === 'Buster' ? getSv(sv, 'bHits')
    : cardType === 'Arts' ? getSv(sv, 'aHits')
    : cardType === 'Quick' ? getSv(sv, 'qHits')
    : cardType === 'Extra' ? getSv(sv, 'eHits') : 0;
  if (hits === 0) return {floor:0, expected:0, ceil:0};

  const perHit = calcStarPerHit(servant, buffs, enemy, options, cardType, position);
  return {
    floor: Math.floor(perHit) * hits,
    expected: Math.round(perHit * hits * 10) / 10,
    ceil: Math.min(3, Math.ceil(perHit)) * hits
  };
}

function calc3TValues(servant, config, buffs, enemy, options) {
  if (!servant) return [];

  const sv = servant;
  const deck = getSv(sv, 'deck'); // e.g. "BBAAQ"
  const npColor = getSv(sv, 'npColor');

  // Parse deck into card counts
  const bCount = (deck.match(/B/g) || []).length;
  const aCount = (deck.match(/A/g) || []).length;
  const qCount = (deck.match(/Q/g) || []).length;

  const results = [];
  for (let turn = 1; turn <= 3; turn++) {
    const npDmg = calcNPDamage(servant, config, buffs, enemy, options);

    // NP gain from NP card (assume 3rd position for max gain in looping)
    const npGainNP = calcNPGainForCard(servant, buffs, enemy, options, npColor, 'third');

    // NP gain from regular cards (average position 2nd for typical hands)
    let totalNPGain = npGainNP;
    if (aCount > 0) totalNPGain += calcNPGainForCard(servant, buffs, enemy, options, 'Arts', 'second') * aCount;
    if (qCount > 0) totalNPGain += calcNPGainForCard(servant, buffs, enemy, options, 'Quick', 'second') * qCount;

    results.push({
      turn,
      npDmg,
      npGain: totalNPGain,
      totalDmg: npDmg.avg
    });
  }
  return results;
}

const CLASS_COLORS = {
  Saber:'#4a90d9', Archer:'#f5a623', Lancer:'#4a90d9', Rider:'#7ed321',
  Caster:'#9013fe', Assassin:'#d0021b', Berserker:'#d0021b', Ruler:'#f8e71c',
  Avenger:'#bd0fe1', Alterego:'#f5a623', MoonCancer:'#50e3c2', Foreigner:'#50e3c2',
  Pretender:'#f5a623', Shielder:'#7ed321', Beast:'#d0021b'
};

// ── Smart Servant Search + Class Filter ──
function ServantSelector({ servants, selectedIndex, onSelect }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const [classFilter, setClassFilter] = useState(null);
  const [focusIdx, setFocusIdx] = useState(-1);
  const inputRef = useRef(null);
  const dropdownRef = useRef(null);
  const listRef = useRef(null);

  const filtered = useMemo(() => {
    let results = servants;
    if (classFilter) {
      results = results.filter(s => getSv(s, 'class') === classFilter);
    }
    if (query.trim()) {
      const q = query.toLowerCase();
      results = results.filter(s => {
        const name = getSv(s, 'name');
        const nameEn = getSv(s, 'nameEn');
        const cls = getSv(s, 'class');
        return (name && name.toLowerCase().includes(q))
          || (nameEn && nameEn.toLowerCase().includes(q))
          || (cls && cls.toLowerCase().includes(q));
      });
    }
    return results.slice(0, 100);
  }, [query, servants, classFilter]);

  const scrollToIdx = useCallback((idx) => {
    if (!listRef.current) return;
    const items = listRef.current.querySelectorAll('.search-item');
    if (items[idx]) items[idx].scrollIntoView({block:'nearest'});
  }, []);

  useEffect(() => {
    function handleClick(e) {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)
          && inputRef.current && !inputRef.current.contains(e.target)) {
        setOpen(false);
      }
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const selectedName = selectedIndex !== null && selectedIndex >= 0
    ? getSv(servants[selectedIndex], 'name') : '';

  const handleFocus = () => {
    setOpen(true);
    if (inputRef.current) inputRef.current.select();
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Escape') { setOpen(false); setFocusIdx(-1); return; }
    if (!open) { setOpen(true); setFocusIdx(0); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setFocusIdx(prev => { const v = Math.min(prev + 1, filtered.length - 1); scrollToIdx(v); return v; });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setFocusIdx(prev => { const v = Math.max(prev - 1, 0); scrollToIdx(v); return v; });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (focusIdx >= 0 && focusIdx < filtered.length) {
        const origIdx = servants.indexOf(filtered[focusIdx]);
        onSelect(origIdx); setOpen(false); setQuery(''); setFocusIdx(-1);
      }
    }
  };

  const EXTRA_CLASSES = ['Ruler','Avenger','Alterego','MoonCancer','Foreigner','Pretender','Shielder','Beast'];
  const MAIN_CLASSES = ['Saber','Archer','Lancer','Rider','Caster','Assassin','Berserker'];

  return (
    <div style={{position:'relative'}}>
      <label htmlFor="servant-search">从者搜索 Servant Search</label>
      <div className="search-row">
        <input
          id="servant-search"
          ref={inputRef}
          type="text"
          value={open ? query : selectedName}
          placeholder="输入从者名称或职阶..."
          onChange={e => { setQuery(e.target.value); setOpen(true); setFocusIdx(0); }}
          onFocus={handleFocus}
          onKeyDown={handleKeyDown}
          autoComplete="off"
        />
      </div>
      <div className="class-chips">
        <button className={'class-chip' + (classFilter===null?' chip-active':'')}
          onClick={() => setClassFilter(null)} style={{fontWeight:700}}
          aria-pressed={classFilter===null}>ALL</button>
        {MAIN_CLASSES.map(cls => (
          <button key={cls}
            className={'class-chip' + (classFilter===cls?' chip-active':'')}
            onClick={() => setClassFilter(prev => prev === cls ? null : cls)}
            aria-pressed={classFilter===cls}
            style={{borderColor:classFilter===cls?(CLASS_COLORS[cls]||'#333'):''}}>
            {cls}
          </button>
        ))}
        <button className={'class-chip' + (classFilter!==null && EXTRA_CLASSES.includes(classFilter)?' chip-active':'')}
          onClick={() => setClassFilter(prev => EXTRA_CLASSES.includes(prev) ? null : EXTRA_CLASSES[0])}
          aria-pressed={classFilter!==null && EXTRA_CLASSES.includes(classFilter)}>
          Extra
        </button>
      </div>
      {classFilter && EXTRA_CLASSES.includes(classFilter) && (
        <div className="class-chips">
          {EXTRA_CLASSES.map(cls => (
            <button key={cls}
              className={'class-chip' + (classFilter===cls?' chip-active':'')}
              onClick={() => setClassFilter(cls)}
              aria-pressed={classFilter===cls}>
              {cls}
            </button>
          ))}
        </div>
      )}
      {open && (
        <div className="search-dropdown" ref={dropdownRef}>
          <div ref={listRef}>

const BUFF_DEFS = [
  {key:'atkUp', label:'攻击力UP%', cap:400, capUnit:'%', group:0},
  {key:'defDown', label:'防御力Down%', cap:100, capUnit:'%', note:'=等效ATK', group:0, groupEnd:true},
  {key:'busterUp', label:'Buster魔放%', cap:400, capUnit:'%', group:1},
  {key:'artsUp', label:'Arts魔放%', cap:400, capUnit:'%', group:1},
  {key:'quickUp', label:'Quick魔放%', cap:400, capUnit:'%', group:1, groupEnd:true},
  {key:'critDmg', label:'暴击威力%', cap:500, capUnit:'%', group:2},
  {key:'starGen', label:'出星率%', cap:300, capUnit:'%', group:2, groupEnd:true},
  {key:'npStrength', label:'宝具威力%', cap:500, capUnit:'%', group:3},
  {key:'npRate', label:'NP获取率%', cap:1000, capUnit:'%', group:3, groupEnd:true},
  {key:'powerMod', label:'C类特攻%', cap:400, capUnit:'%', group:4},
  {key:'flatDmg', label:'固定伤害', cap:100000, capUnit:'', group:4},
];

const SOURCE_KEYS = ['ce','self','support','enemy','debuff'];
const SOURCE_LABELS = {ce:'礼装CE',self:'自身Self',support:'助战Support',enemy:'敌方Enemy',debuff:'减益Debuff'};

const CORE_BUFF_KEYS = new Set(['atkUp','defDown','busterUp','artsUp','quickUp','npStrength','npRate','powerMod']);

function BuffTable({ buffs, servant, options, onChange }) {
  const [showAll, setShowAll] = useState(false);
  const agg = useMemo(() => {
    if (!servant) return {};
    return aggregateBuffs(buffs, servant, options);
  }, [buffs, servant, options]);

  const updateBuffSource = (source, key, val) => {
    const newBuffs = JSON.parse(JSON.stringify(buffs));
    newBuffs[source][key] = val;
    onChange(newBuffs);
  };

  const visibleDefs = showAll ? BUFF_DEFS : BUFF_DEFS.filter(d => CORE_BUFF_KEYS.has(d.key));

  return (
    <div className="section" style={{overflowX:'auto'}}>
      <h2 className="panel-title">Buff配置</h2>
      <table className="buff-table">
        <thead>
          <tr>
            <th style={{textAlign:'right',minWidth:100}}>Buff</th>
            {SOURCE_KEYS.map(src => (
              <th key={src}>{SOURCE_LABELS[src]}</th>
            ))}
            <th>Total (cap)</th>
          </tr>
        </thead>
        <tbody>
          {visibleDefs.map(def => {
            const isFlat = def.key === 'flatDmg';
            const totalRaw = SOURCE_KEYS.reduce((sum, src) => sum + (buffs[src][def.key]||0), 0);
            const totalCapped = agg[def.key] !== undefined ? Math.round(agg[def.key]) : Math.round(totalRaw);
            const isCapped = totalCapped >= def.cap;
            return (
              <tr key={def.key} className={def.groupEnd?'group-end':''}>
                <td className="buff-label">
                  <span className="tooltip" aria-label={`${def.label} cap ${def.cap}${def.capUnit}`}>
                    {def.label}
                  </span>
                </td>
                {SOURCE_KEYS.map(src => (
                  <td key={src}>
                    <input type="number" min="0" max={def.cap}
                      value={buffs[src][def.key]||0}
                      onChange={e => updateBuffSource(src, def.key, parseFloat(e.target.value)||0)}
                      onFocus={e => e.target.select()}
                    />
                  </td>
                ))}
                <td className={'total-cell' + (isCapped?' capped':'')}>
                  {isFlat ? Math.round(totalCapped).toLocaleString() : Math.round(totalCapped) + '%'}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <button onClick={() => setShowAll(!showAll)}
        style={{display:'block',margin:'8px auto 0',fontSize:'var(--font-xs)',padding:'4px 16px',cursor:'pointer',background:'none',border:'1px dashed var(--border)',borderRadius:4,color:'var(--text-muted)'}}>
        {showAll ? '\u25B2 收起 Collapse' : '\u25BC 展开全部 Show All (' + BUFF_DEFS.length + ' buffs)'}
      </button>
    </div>
  );
}

// ── Card Chain v2: Clickable Slots ──
function CardChainPanel({ servant, config, buffs, enemy, options }) {
  const [slots, setSlots] = useState(['Buster','Arts','Quick']);
  const [showExtra, setShowExtra] = useState(false);

  if (!servant) return null;

  const cycleCard = (idx) => {
    setSlots(prev => {
      const next = [...prev];
      next[idx] = next[idx] === 'Buster' ? 'Arts' : next[idx] === 'Arts' ? 'Quick' : 'Buster';
      return next;
    });
  };

  const cards = showExtra ? [...slots, 'Extra'] : slots;
  const firstCard = cards[0];
  const results = cards.map((cardType, i) => {
    const position = i === 0 ? 'first' : i === 1 ? 'second' : i === 2 ? 'third' : 'extra';
    const dmg = calcCardDamage(servant, config, buffs, enemy, options, cardType, position, firstCard);
    const npGain = calcNPGainForCard(servant, buffs, enemy, options, cardType, position);
    const stars = calcStars(servant, buffs, enemy, options, cardType, position);
    return { cardType, position, dmg, npGain, stars };
  });

  const totalDmg = results.reduce((s,r) => s + r.dmg, 0);
  const totalNp = results.reduce((s,r) => s + r.npGain, 0);
  const totalStars = results.reduce((s,r) => s + r.stars.expected, 0);

  const cardColors = {Buster:'var(--buster)',Arts:'var(--arts)',Quick:'var(--quick)',Extra:'var(--gold)'};
  const cardLabel = {Buster:'B',Arts:'A',Quick:'Q',Extra:'EX'};

  return (
    <div className="section-card">
      <h2 className="panel-title">Card Chain</h2>
      <div className="card-slots">
        {slots.map((ct, i) => (
          <button key={i} className={'card-slot ' + ct}
            onClick={() => cycleCard(i)}
            onKeyDown={e => {(e.key==='Enter'||e.key===' ')&&(e.preventDefault(),cycleCard(i))}}
            aria-label={`卡牌${i+1}: ${ct}`}>
            <span className="slot-pos">{i+1}</span>
            {cardLabel[ct]}
          </button>
        ))}
        <span className="plus-sep">+</span>
        <button className={'extra-toggle' + (showExtra?' on':'')}
          onClick={() => setShowExtra(!showExtra)}
          onKeyDown={e => {(e.key==='Enter'||e.key===' ')&&(e.preventDefault(),setShowExtra(!showExtra))}}
          aria-pressed={showExtra}
          aria-label="切换Extra攻击">
          EX
        </button>
      </div>
      <div style={{fontSize:'var(--font-sm)',color:'var(--text-muted)',marginBottom:8}}>
        点击卡牌切换颜色 B&rarr;A&rarr;Q | 首卡: <span style={{color:cardColors[firstCard],fontWeight:700}}>{firstCard}</span>
        {' '}| 暴击:{options.isCrit?'ON':'OFF'} | 鞭尸:{options.overkill?'ON':'OFF'}
      </div>
      <div className="chain-result">
        <div className="chain-header">Card</div>
        <div className="chain-header">Damage</div>
        <div className="chain-header">NP%</div>
        <div className="chain-header">Stars</div>
        {results.map((r, i) => (
          <React.Fragment key={i}>
            <div style={{fontWeight:700,color:cardColors[r.cardType]}}>{r.cardType} [{r.position}]</div>
            <div>{r.dmg.toLocaleString()}</div>
            <div>{r.npGain.toFixed(1)}</div>
            <div>{r.stars.expected}</div>
          </React.Fragment>
        ))}
        <div className="chain-total">TOTAL</div>
        <div className="chain-total">{totalDmg.toLocaleString()}</div>
        <div className="chain-total">{totalNp.toFixed(1)}</div>
        <div className="chain-total">{totalStars.toFixed(1)}</div>
      </div>
    </div>
  );
}

};

function PresetButtons({ onApply }) {
  return (
    <div className="preset-row">
      <span className="preset-label">预设 Presets</span>
      {Object.entries(PRESETS).map(([label, partialBuffs]) => (
        <button key={label} className={PRESET_COLORS[label]||''} onClick={() => {
          const fresh = JSON.parse(JSON.stringify(defaultBuffs));
          for (const src of SOURCE_KEYS) {
            if (partialBuffs[src]) {
              Object.assign(fresh[src], partialBuffs[src]);
            }
          }
          onApply(fresh);
        }}>{label}</button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP v2 - Two-Column Sticky Layout
// ═══════════════════════════════════════════════════════════════

function App() {
  const [selectedIndex, setSelectedIndex] = useState(null);
  const [isCustom, setIsCustom] = useState(false);
  const [customServant, setCustomServant] = useState(CUSTOM_SERVANT_DEFAULTS);
  const [config, setConfig] = useState({level:90, npLevel:1, fou:1000, ceAtk:0, extraAtk:0});
  const [buffs, setBuffs] = useState(defaultBuffs);
  const [enemy, setEnemy] = useState({class:'Saber', attr:'Human', def:0});
  const [options, setOptions] = useState({enablePassives:true, overkill:false, firstCard:'Buster', isCrit:false});

  const servant = isCustom ? customServant : (selectedIndex !== null ? SERVANT_DB[selectedIndex] : null);

  const npResult = useMemo(() => {
    if (!servant) return null;
    return calcNPDamage(servant, config, buffs, enemy, options);
  }, [servant, config, buffs, enemy, options]);

  const handleReset = () => {
    setSelectedIndex(null);
    setIsCustom(false);
    setCustomServant(CUSTOM_SERVANT_DEFAULTS);
    setConfig({level:90, npLevel:1, fou:1000, ceAtk:0, extraAtk:0});
    setBuffs(JSON.parse(JSON.stringify(defaultBuffs)));
    setEnemy({class:'Saber', attr:'Human', def:0});
    setOptions({enablePassives:true, overkill:false, firstCard:'Buster', isCrit:false});
  };

  return (
    <div className="app">
      <h1 className="app-title">FGO NP Damage Calculator // 宝具伤害计算器</h1>

      <div className="layout-2col">
        {/* LEFT COLUMN: Inputs (scrollable) */}
        <div className="left-col">
          {/* Search */}
          <div className="section">
            <div className="mode-toggle" style={{display:'flex',gap:0,marginBottom:12}}>
              <button
                className={!isCustom?'active':''}
                onClick={() => setIsCustom(false)}
                style={{borderRadius:'var(--radius-sm) 0 0 var(--radius-sm)',flex:1}}>
                数据库 Database
              </button>
              <button
                className={isCustom?'active':''}
                onClick={() => { setIsCustom(true); setSelectedIndex(null); }}
                style={{borderRadius:'0 var(--radius-sm) var(--radius-sm) 0',flex:1}}>
                自定义 Custom
              </button>
            </div>
            {!isCustom && (
              <ServantSelector servants={SERVANT_DB} selectedIndex={selectedIndex} onSelect={(idx) => { setSelectedIndex(idx); setIsCustom(false); }} />
            )}
          </div>

          {/* Servant Info Card */}
          {isCustom ? (
            <CustomServantForm servant={customServant} onChange={setCustomServant} />
          ) : (
            <ServantStats servant={servant} />
          )}

          {/* Presets */}
          <PresetButtons onApply={setBuffs} />

          {/* Level Config + Enemy + Options */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <LevelConfig config={config} onChange={setConfig} />
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <EnemyPanel enemy={enemy} onChange={setEnemy} />
              <OptionsPanel options={options} onChange={setOptions} />
            </div>
          </div>

          {/* Buff Table */}
          <BuffTable buffs={buffs} servant={servant} options={options} onChange={setBuffs} />

          {/* NP Damage Detail */}
          <NPDamageResult result={npResult} servant={servant} config={config}
            buffs={buffs} enemy={enemy} options={options} />

          {/* Card Chain */}
          <CardChainPanel servant={servant} config={config} buffs={buffs}
            enemy={enemy} options={options} />

          {/* Reset */}
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button className="reset" onClick={handleReset} style={{fontSize:'var(--font-sm)'}}>{'\u27F2'} Reset All</button>
          </div>
        </div>

        {/* RIGHT COLUMN: Sticky Results */}
        <div className="right-col">
          <NPDamageSticky result={npResult} servant={servant} config={config} />
          <ThreeTResult servant={servant} config={config} buffs={buffs}
            enemy={enemy} options={options} />
        </div>
      </div>

      <div style={{textAlign:'center',marginTop:40,fontSize:'var(--font-sm)',color:'var(--text-muted)'}}>
        FGO Damage Calculator v2.0 · Data from FGO计算器Ver9.9 · 435 Servants · React 18
      </div>
    </div>
  );
}
